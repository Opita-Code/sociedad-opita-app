name: Deploy Sociedad Opita (prod)

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/deploy-prod.yml'

concurrency:
  group: prod-deploy
  cancel-in-progress: false  # don't cancel mid-deploy

jobs:
  build-and-deploy:
    name: Build + Sync S3 + Invalidate CloudFront
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Sync to S3
        run: |
          aws s3 sync ./dist "s3://sociedad-opita-app-prod" \
            --delete \
            --cache-control "public, max-age=300, s-maxage=3600" \
            --exclude "*.map"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*" \
            --query "Invalidation.Id" \
            --output text

      - name: Verify deployment
        run: |
          echo "Waiting 10s for CloudFront to propagate invalidation..."
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://sociedad.opitacode.com/ || echo "000")
          echo "https://sociedad.opitacode.com/ returned HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Site returned non-200 status. Check CloudFront console."
          fi
