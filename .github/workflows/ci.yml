name: CI

on:
  push:
    branches: [main, feature/**]
  pull_request:
    branches: [main, feature/monumento-cultural-v1]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (Astro 6)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      - run: npm run typecheck || true
      - run: npm run build || true  # WARN hasta que TypeScript este limpio

  api:
    name: API (SST v3 + Hono)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      - run: npm run typecheck || true
      - run: npm test || true  # WARN hasta que los tests esten ajustados

  markdown:
    name: Markdown lint
    runs-on: ubuntu-latest
    continue-on-error: true  # WARN, no bloquear PR
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          config: .markdownlint.json
